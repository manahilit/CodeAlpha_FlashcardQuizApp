<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📚 Flashcard Quiz App</h1>
        <div class="flashcard">
            <div class="flashcard-inner">
                <div class="flashcard-front">
                    <p id="question-text">Question</p>
                </div>
                <div class="flashcard-back">
                    <p id="answer-text">Answer</p>
                </div>
            </div>
        </div>

        <button id="show-answer-btn">Show Answer</button>
        <div class="nav-buttons">
            <button id="prev-btn">◀ Previous</button>
            <button id="next-btn">Next ▶</button>
        </div>

        <div class="edit-area">
            <h3>✏️ Add / Edit Flashcard</h3>
            <input type="text" id="edit-question" placeholder="Question">
            <input type="text" id="edit-answer" placeholder="Answer">
            <button id="save-btn">Save</button>
            <button id="delete-btn">Delete Current</button>
        </div>
        <p id="card-counter"></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
