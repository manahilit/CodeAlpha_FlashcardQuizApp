<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flashcard Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>📚 Flashcard Quiz App</h1>

    <div class="card">
        <h2 id="question">Question here</h2>
        <button id="showAnswer">Show Answer</button>
        <h3 id="answer" style="display:none">Answer here</h3>
    </div>

    <div class="nav-buttons">
        <button id="prev">◀ Previous</button>
        <button id="next">Next ▶</button>
    </div>

    <hr>

    <h3>✏️ Add / Edit Flashcard</h3>
    <input type="text" id="newQ" placeholder="Enter question">
    <br>
    <input type="text" id="newA" placeholder="Enter answer">
    <br>
    <button id="addNew">➕ Add New Card</button>
    <button id="updateCurrent">✏️ Update Current Card</button>
    <button id="delete">🗑️ Delete Current Card</button>

    <p id="counter"></p>
</div>

<script src="script.js"></script>

</body>
</html>
